<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Real-Time Object Detection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; }
    header { background: #1a1a2e; padding: 18px 40px; display: flex; align-items: center; gap: 14px; border-bottom: 2px solid #00d4ff; }
    header h1 { font-size: 1.4rem; color: #00d4ff; letter-spacing: 1px; }
    header span { font-size: 0.8rem; color: #888; background: #252545; padding: 3px 10px; border-radius: 20px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    .tabs { display: flex; gap: 12px; margin-bottom: 28px; }
    .tab-btn { padding: 10px 28px; border: 2px solid #333; background: transparent; color: #aaa; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; }
    .tab-btn.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0,212,255,0.08); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .upload-zone { border: 2px dashed #333; border-radius: 12px; padding: 50px; text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 20px; }
    .upload-zone:hover { border-color: #00d4ff; }
    .upload-zone p { color: #888; margin-top: 10px; font-size: 0.9rem; }
    .upload-icon { font-size: 3rem; }
    #file-input { display: none; }
    .btn { padding: 11px 30px; background: #00d4ff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.95rem; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-red { background: #ff4444; color: #fff; }
    .results-grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; margin-top: 24px; }
    .image-box { background: #1a1a1a; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 360px; }
    .image-box img { max-width: 100%; max-height: 500px; border-radius: 8px; }
    .detections-panel { background: #1a1a1a; border-radius: 12px; padding: 20px; overflow-y: auto; max-height: 500px; }
    .detections-panel h3 { color: #00d4ff; margin-bottom: 16px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; }
    .detection-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #252525; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #00d4ff; }
    .detection-item .label { font-weight: 600; font-size: 0.9rem; }
    .confidence-bar { height: 4px; background: #333; border-radius: 2px; overflow: hidden; width: 120px; margin-top: 4px; }
    .confidence-fill { height: 100%; background: #00d4ff; border-radius: 2px; }
    .conf-text { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .webcam-container { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
    .video-box { background: #1a1a1a; border-radius: 12px; overflow: hidden; position: relative; }
    #webcam-feed, #output-canvas { width: 100%; border-radius: 12px; }
    #output-canvas { position: absolute; top: 0; left: 0; display: none; }
    .webcam-controls { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
    .stats-bar { display: flex; gap: 20px; background: #1a1a1a; border-radius: 10px; padding: 14px 20px; margin-bottom: 20px; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #00d4ff; }
    .stat-label { font-size: 0.75rem; color: #888; margin-top: 2px; }
    .spinner { display: none; width: 30px; height: 30px; border: 3px solid #333; border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; display: inline-block; margin-right: 6px; }
    .status-dot.live { background: #00ff88; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .fps-counter { font-size: 0.8rem; color: #888; margin-left: auto; }
  </style>
</head>
<body>

<header>
  <div style="font-size:1.6rem">🎯</div>
  <h1>Real-Time Object Detection</h1>
  <span>YOLOv8 Powered</span>
</header>

<div class="container">
  <div class="stats-bar">
    <div class="stat"><div class="stat-value" id="total-detections">0</div><div class="stat-label">Objects Detected</div></div>
    <div class="stat"><div class="stat-value" id="unique-classes">0</div><div class="stat-label">Unique Classes</div></div>
    <div class="stat"><div class="stat-value" id="avg-confidence">—</div><div class="stat-label">Avg Confidence</div></div>
    <div class="fps-counter" id="fps-display"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('image', event)">📷 Image Upload</button>
    <button class="tab-btn" onclick="switchTab('webcam', event)">🎥 Live Webcam</button>
  </div>

  <!-- IMAGE TAB -->
  <div class="tab-content active" id="tab-image">
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📁</div>
      <p>Click to upload or drag & drop an image</p>
      <p>Supports JPG, PNG, WEBP</p>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="handleFileUpload(event)" />
    <div style="display:flex; gap:12px; align-items:center;">
      <button class="btn" id="detect-btn" onclick="runDetection()" disabled>Detect Objects</button>
      <div class="spinner" id="spinner"></div>
    </div>
    <div class="results-grid" id="results-section" style="display:none;">
      <div class="image-box"><img id="result-image" src="" alt="Detection result" /></div>
      <div class="detections-panel"><h3>Detections</h3><div id="detection-list"></div></div>
    </div>
  </div>

  <!-- WEBCAM TAB -->
  <div class="tab-content" id="tab-webcam">
    <div class="webcam-controls">
      <button class="btn" id="start-btn" onclick="startWebcam()">▶ Start Detection</button>
      <button class="btn btn-red" id="stop-btn" onclick="stopWebcam()" disabled>■ Stop</button>
      <span style="display:flex; align-items:center; font-size:0.9rem; color:#888;">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Idle</span>
      </span>
    </div>
    <div class="webcam-container">
      <div class="video-box">
        <video id="webcam-feed" autoplay muted playsinline></video>
        <canvas id="output-canvas"></canvas>
      </div>
      <div class="detections-panel">
        <h3>Live Detections</h3>
        <div id="live-detection-list"><p id="no-detections" style="color:#555; text-align:center; margin-top:20px;">Start detection to see results</p></div>
      </div>
    </div>
  </div>
</div>

<script>
  const captureCanvas = document.createElement("canvas");
  const captureCtx = captureCanvas.getContext("2d");
  let selectedFile = null;
  let websocket = null;
  let streaming = false;
  let frameCount = 0;
  let lastFpsTime = Date.now();
  let animFrameId = null;

  function switchTab(tab, event) {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
    document.getElementById(`tab-${tab}`).classList.add("active");
    event.target.classList.add("active");
    if (tab !== "webcam") stopWebcam();
  }

  const uploadZone = document.getElementById("upload-zone");
  uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.style.borderColor = "#00d4ff"; });
  uploadZone.addEventListener("dragleave", () => { uploadZone.style.borderColor = "#333"; });
  uploadZone.addEventListener("drop", e => {
    e.preventDefault();
    uploadZone.style.borderColor = "#333";
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith("image/")) loadPreview(file);
  });

  function handleFileUpload(event) {
    const file = event.target.files[0];
    if (file) loadPreview(file);
  }

  function loadPreview(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      uploadZone.innerHTML = `<img src="${e.target.result}" style="max-height:200px; border-radius:8px;" /><p style="margin-top:10px; color:#00d4ff;">${file.name}</p>`;
    };
    reader.readAsDataURL(file);
    document.getElementById("detect-btn").disabled = false;
    document.getElementById("results-section").style.display = "none";
  }

  async function runDetection() {
    if (!selectedFile) return;
    const btn = document.getElementById("detect-btn");
    const spinner = document.getElementById("spinner");
    btn.disabled = true;
    spinner.style.display = "block";
    const formData = new FormData();
    formData.append("file", selectedFile);
    try {
      const res = await fetch("/detect/image", { method: "POST", body: formData });
      const data = await res.json();
      if (data.error) { alert(data.error); return; }
      document.getElementById("result-image").src = data.annotated_image;
      document.getElementById("results-section").style.display = "grid";
      renderDetections(data.detections, "detection-list");
      updateStats(data.detections);
    } catch (err) {
      alert("Error connecting to server. Is the backend running?");
    } finally {
      btn.disabled = false;
      spinner.style.display = "none";
    }
  }

  async function startWebcam() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      const video = document.getElementById("webcam-feed");
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      const canvas = document.getElementById("output-canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      captureCanvas.width = video.videoWidth;
      captureCanvas.height = video.videoHeight;
      canvas.style.display = "block";
      const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
      websocket = new WebSocket(`${wsProtocol}://${location.host}/detect/stream`);
      websocket.onopen = () => {
        streaming = true;
        document.getElementById("start-btn").disabled = true;
        document.getElementById("stop-btn").disabled = false;
        document.getElementById("status-dot").classList.add("live");
        document.getElementById("status-text").textContent = "Live";
        document.getElementById("no-detections").style.display = "none";
        sendFrame();
      };
      websocket.onmessage = e => {
        const data = JSON.parse(e.data);
        const img = new Image();
        img.onload = () => {
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };
        img.src = data.annotated_frame;
        renderDetections(data.detections, "live-detection-list");
        updateStats(data.detections);
        updateFPS();
      };
      websocket.onerror = () => stopWebcam();
    } catch (err) {
      alert("Could not access webcam: " + err.message);
    }
  }

  function sendFrame() {
    if (!streaming) return;
    const video = document.getElementById("webcam-feed");
    captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
    const frameData = captureCanvas.toDataURL("image/jpeg", 0.7);
    if (websocket && websocket.readyState === WebSocket.OPEN) {
      websocket.send(JSON.stringify({ frame: frameData }));
    }
    animFrameId = setTimeout(sendFrame, 80);
  }

  function stopWebcam() {
    streaming = false;
    clearTimeout(animFrameId);
    if (websocket) { websocket.close(); websocket = null; }
    const video = document.getElementById("webcam-feed");
    if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
    document.getElementById("output-canvas").style.display = "none";
    document.getElementById("start-btn").disabled = false;
    document.getElementById("stop-btn").disabled = true;
    document.getElementById("status-dot").classList.remove("live");
    document.getElementById("status-text").textContent = "Idle";
    document.getElementById("fps-display").textContent = "";
  }

  function renderDetections(detections, containerId) {
    const container = document.getElementById(containerId);
    if (!detections || detections.length === 0) {
      container.innerHTML = `<p style="color:#555; text-align:center; margin-top:20px;">No objects detected</p>`;
      return;
    }
    const grouped = {};
    detections.forEach(d => {
      if (!grouped[d.class]) grouped[d.class] = { count: 0, totalConf: 0 };
      grouped[d.class].count++;
      grouped[d.class].totalConf += d.confidence;
    });
    container.innerHTML = Object.entries(grouped).map(([cls, data]) => {
      const avgConf = (data.totalConf / data.count * 100).toFixed(1);
      return `<div class="detection-item">
        <div>
          <div class="label">${cls} ${data.count > 1 ? `<span style="color:#888;font-size:0.8rem;">×${data.count}</span>` : ""}</div>
          <div class="confidence-bar"><div class="confidence-fill" style="width:${avgConf}%"></div></div>
          <div class="conf-text">${avgConf}% confidence</div>
        </div>
      </div>`;
    }).join("");
  }

  function updateStats(detections) {
    if (!detections || detections.length === 0) return;
    const classes = new Set(detections.map(d => d.class));
    const avgConf = detections.reduce((s, d) => s + d.confidence, 0) / detections.length;
    document.getElementById("total-detections").textContent = detections.length;
    document.getElementById("unique-classes").textContent = classes.size;
    document.getElementById("avg-confidence").textContent = (avgConf * 100).toFixed(1) + "%";
  }

  function updateFPS() {
    frameCount++;
    const now = Date.now();
    if (now - lastFpsTime >= 1000) {
      document.getElementById("fps-display").textContent = `${frameCount} FPS`;
      frameCount = 0;
      lastFpsTime = now;
    }
  }
</script>
</body>
</html>
